name: Build PulseVisual

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        working-directory: pulsevisual
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.8/bin/gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: pulsevisual-mod
          path: pulsevisual/build/libs/pulsevisual-*.jar
          retention-days: 30
